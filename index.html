<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>珍藏大師管理平台</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* 隱藏捲軸但保留滾動功能 (針對模態視窗等) */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="flex min-h-screen bg-slate-50 text-slate-900 font-sans">

  <!-- 側邊導航欄 -->
  <aside class="w-20 lg:w-64 border-r border-slate-200 bg-white flex flex-col p-4 sticky top-0 h-screen">
    <div class="flex items-center gap-3 px-2 mb-10">
      <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-inner shrink-0">
        <i data-lucide="box" class="w-6 h-6"></i>
      </div>
      <span class="font-bold text-xl tracking-tight lg:block hidden whitespace-nowrap">珍藏大師</span>
    </div>

    <nav class="flex-1 space-y-2" id="nav-menu">
      <button onclick="navigate('dashboard')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-500 hover:bg-slate-100 hover:text-slate-900" data-target="dashboard">
        <i data-lucide="layout-grid" class="w-5 h-5 shrink-0"></i>
        <span class="font-medium text-sm lg:block hidden">控制面板</span>
      </button>
      <button onclick="navigate('collections')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-500 hover:bg-slate-100 hover:text-slate-900" data-target="collections">
        <i data-lucide="package" class="w-5 h-5 shrink-0"></i>
        <span class="font-medium text-sm lg:block hidden">我的收藏</span>
      </button>
      <button onclick="navigate('wishlist')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-500 hover:bg-slate-100 hover:text-slate-900" data-target="wishlist">
        <i data-lucide="heart" class="w-5 h-5 shrink-0"></i>
        <span class="font-medium text-sm lg:block hidden">願望清單</span>
      </button>
      <button onclick="navigate('analytics')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-500 hover:bg-slate-100 hover:text-slate-900" data-target="analytics">
        <i data-lucide="trending-up" class="w-5 h-5 shrink-0"></i>
        <span class="font-medium text-sm lg:block hidden">價值分析</span>
      </button>
    </nav>

    <div class="mt-auto space-y-2 border-t pt-4">
      <button onclick="navigate('settings')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-500 hover:bg-slate-100 hover:text-slate-900" data-target="settings">
        <i data-lucide="settings" class="w-5 h-5 shrink-0"></i>
        <span class="font-medium text-sm lg:block hidden">個人設定</span>
      </button>
      <div class="p-4 bg-slate-50 rounded-2xl lg:block hidden">
        <div class="flex items-center gap-2 text-xs font-semibold text-slate-400 mb-2 uppercase">
          <i data-lucide="shield-check" class="w-3.5 h-3.5 shrink-0"></i>
          雲端同步中
        </div>
        <div class="h-2 bg-slate-200 rounded-full overflow-hidden">
          <div class="h-full bg-green-500 w-[85%]"></div>
        </div>
        <p class="text-[10px] text-slate-500 mt-2">已使用 4.2GB / 5GB</p>
      </div>
    </div>
  </aside>

  <!-- 主要內容區 -->
  <main class="flex-1 flex flex-col min-w-0">
    <!-- 頂部搜索與個人資料 -->
    <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-8 sticky top-0 z-10">
      <div class="relative w-full max-w-md">
        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-[18px] h-[18px]"></i>
        <input 
          id="searchInput"
          type="text" 
          placeholder="搜尋收藏品、標籤或分類..."
          class="w-full bg-slate-100 border-none rounded-2xl py-2.5 pl-10 pr-4 text-sm focus:ring-2 focus:ring-blue-500/20 transition-all outline-none"
        />
      </div>

      <div class="flex items-center gap-4 shrink-0">
        <button class="relative p-2 text-slate-500 hover:bg-slate-100 rounded-full transition-colors">
          <i data-lucide="clock" class="w-5 h-5"></i>
          <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
        </button>
        <div class="h-10 w-10 rounded-full bg-gradient-to-tr from-blue-600 to-indigo-500 border-2 border-white shadow-sm cursor-pointer hover:scale-105 transition-transform overflow-hidden">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User" class="w-full h-full" />
        </div>
      </div>
    </header>

    <div class="p-8 max-w-7xl mx-auto w-full" id="main-container">
      <!-- 動態渲染內容將放置於此 -->
    </div>
  </main>

  <!-- 模擬新增 Modal -->
  <div id="addModal" class="fixed inset-0 z-50 hidden flex items-center justify-center px-4">
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="toggleModal(false)"></div>
    <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl relative transform transition-all scale-95 opacity-0 duration-200" id="modalContent">
      <div class="p-6 border-b border-slate-100 flex justify-between items-center">
        <h2 class="text-xl font-bold">新增珍藏項目</h2>
        <button onclick="toggleModal(false)" class="text-slate-400 hover:text-slate-900">
          <i data-lucide="plus" class="rotate-45 w-6 h-6"></i>
        </button>
      </div>
      <div class="p-8 space-y-4">
        <div class="space-y-2">
          <label class="text-sm font-semibold text-slate-700">收藏品名稱</label>
          <input type="text" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="例如：1985 年復古拍立得" />
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-700">分類</label>
            <select class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500/20">
              <option>相機</option>
              <option>手錶</option>
              <option>藝術品</option>
            </select>
          </div>
          <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-700">購入金額</label>
            <input type="text" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="NT$" />
          </div>
        </div>
        <div class="pt-4 flex gap-3">
          <button onclick="toggleModal(false)" class="flex-1 px-6 py-3 border border-slate-200 rounded-2xl font-semibold hover:bg-slate-50 transition-colors">
            取消
          </button>
          <button onclick="toggleModal(false)" class="flex-1 px-6 py-3 bg-blue-600 text-white rounded-2xl font-semibold shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all">
            確認儲存
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- JavaScript 邏輯 -->
  <script>
    // --- 數據狀態 ---
    const INITIAL_COLLECTIONS = [
      { id: 1, name: '復古機械錶', category: '鐘錶', items: 12, value: 'NT$ 850,000', color: 'bg-blue-500', icon: 'clock' },
      { id: 2, name: '黑膠唱片珍藏', category: '音樂', items: 145, value: 'NT$ 120,000', color: 'bg-purple-500', icon: 'music' },
      { id: 3, name: '稀有球鞋', category: '潮流', items: 24, value: 'NT$ 450,000', color: 'bg-orange-500', icon: 'package' },
      { id: 4, name: '初版漫畫', category: '書籍', items: 56, value: 'NT$ 85,000', color: 'bg-green-500', icon: 'book' },
    ];

    const INITIAL_ITEMS = [
      { id: 101, collectionId: 1, name: 'Rolex Submariner 1970', date: '2023-10-12', price: 'NT$ 320,000', rating: 5, status: '良好', tags: ['勞力士', '古董'], image: 'https://images.unsplash.com/photo-1547996111-f7cb39e3d039?auto=format&fit=crop&q=80&w=400' },
      { id: 102, collectionId: 1, name: 'Omega Speedmaster', date: '2024-01-05', price: 'NT$ 180,000', rating: 4, status: '全新', tags: ['登月錶', '經典'], image: 'https://images.unsplash.com/photo-1524592094714-0f0654e20314?auto=format&fit=crop&q=80&w=400' },
      { id: 201, collectionId: 2, name: 'Abbey Road - The Beatles', date: '2023-05-20', price: 'NT$ 12,000', rating: 5, status: '二手', tags: ['搖滾', '披頭四'], image: 'https://images.unsplash.com/photo-1603048588665-791ca8aea617?auto=format&fit=crop&q=80&w=400' },
      { id: 301, collectionId: 3, name: 'Jordan 1 Retro High', date: '2023-12-15', price: 'NT$ 25,000', rating: 5, status: '全新', tags: ['Nike', 'Jordan'], image: 'https://images.unsplash.com/photo-1552346154-21d32810aba3?auto=format&fit=crop&q=80&w=400' },
    ];

    let state = {
      activeTab: 'dashboard',
      searchQuery: '',
      selectedCollection: null,
      viewMode: 'grid',
    };

    // --- DOM 元素 ---
    const mainContainer = document.getElementById('main-container');
    const searchInput = document.getElementById('searchInput');
    const addModal = document.getElementById('addModal');
    const modalContent = document.getElementById('modalContent');
    const navButtons = document.querySelectorAll('.nav-btn');

    // --- 渲染邏輯 ---
    function render() {
      updateNavigation();
      
      let html = '';

      if (!state.selectedCollection && state.activeTab === 'dashboard') {
        html = renderDashboard();
      } else if (state.selectedCollection || state.activeTab === 'collections') {
        html = renderCollectionDetails();
      } else {
        html = `<div class="text-center text-slate-500 py-20">此區塊正在建置中...</div>`;
      }

      mainContainer.innerHTML = html;
      lucide.createIcons(); // 重新渲染圖示
    }

    function updateNavigation() {
      navButtons.forEach(btn => {
        const target = btn.getAttribute('data-target');
        if (target === state.activeTab) {
          btn.className = 'nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 bg-blue-600 text-white shadow-lg shadow-blue-200';
        } else {
          btn.className = 'nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-500 hover:bg-slate-100 hover:text-slate-900';
        }
      });
    }

    function renderDashboard() {
      let statsHtml = `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex justify-between items-start mb-4">
              <div class="p-3 rounded-2xl bg-green-50 text-green-600"><i data-lucide="dollar-sign" class="w-6 h-6"></i></div>
              <span class="text-xs font-bold px-2 py-1 rounded-full bg-green-50 text-green-600">+12.5%</span>
            </div>
            <h3 class="text-slate-500 text-sm font-medium">估計總價值</h3>
            <p class="text-2xl font-bold mt-1">NT$ 1,505,000</p>
          </div>
          <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex justify-between items-start mb-4">
              <div class="p-3 rounded-2xl bg-blue-50 text-blue-600"><i data-lucide="plus" class="w-6 h-6"></i></div>
              <span class="text-xs font-bold px-2 py-1 rounded-full bg-blue-50 text-blue-600">+5%</span>
            </div>
            <h3 class="text-slate-500 text-sm font-medium">本月新增項</h3>
            <p class="text-2xl font-bold mt-1">18 件</p>
          </div>
          <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
            <div class="flex justify-between items-start mb-4">
              <div class="p-3 rounded-2xl bg-rose-50 text-rose-600"><i data-lucide="heart" class="w-6 h-6"></i></div>
              <span class="text-xs font-bold px-2 py-1 rounded-full bg-rose-50 text-rose-600">穩定</span>
            </div>
            <h3 class="text-slate-500 text-sm font-medium">平均評分</h3>
            <p class="text-2xl font-bold mt-1">4.8 / 5.0</p>
          </div>
        </div>
      `;

      let collectionsHtml = `
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mt-8">
          ${INITIAL_COLLECTIONS.map(col => `
            <div onclick="selectCollection(${col.id})" class="group bg-white rounded-3xl overflow-hidden border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all cursor-pointer">
              <div class="h-24 ${col.color} relative overflow-hidden">
                <div class="absolute top-0 right-0 p-8 opacity-20 transform translate-x-4 -translate-y-4 group-hover:scale-110 transition-transform">
                  <i data-lucide="box" class="w-20 h-20"></i>
                </div>
              </div>
              <div class="p-6 relative">
                <div class="absolute -top-10 left-6 w-14 h-14 bg-white rounded-2xl shadow-lg flex items-center justify-center text-slate-700">
                  <i data-lucide="tag" class="w-7 h-7"></i>
                </div>
                <div class="mt-4">
                  <h3 class="font-bold text-lg group-hover:text-blue-600 transition-colors">${col.name}</h3>
                  <p class="text-slate-400 text-sm mb-4">${col.category}</p>
                  <div class="flex justify-between items-center text-sm">
                    <span class="text-slate-600 bg-slate-100 px-3 py-1 rounded-full">${col.items} 件商品</span>
                    <span class="font-bold text-slate-900">${col.value}</span>
                  </div>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;

      return `
        <div class="space-y-8 animate-[fadeIn_0.7s_ease-out]">
          <div class="flex items-end justify-between flex-wrap gap-4">
            <div>
              <h1 class="text-3xl font-bold text-slate-900">歡迎回來，收藏家</h1>
              <p class="text-slate-500 mt-1">目前您擁有 ${INITIAL_COLLECTIONS.length} 個主要分類，共計 237 件收藏。</p>
            </div>
            <button onclick="toggleModal(true)" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl flex items-center gap-2 font-semibold shadow-lg shadow-blue-200 transition-all active:scale-95">
              <i data-lucide="plus" class="w-5 h-5"></i>
              <span>建立新收藏</span>
            </button>
          </div>
          ${statsHtml}
          ${collectionsHtml}
        </div>
      `;
    }

    function renderCollectionDetails() {
      // 過濾數據
      let filtered = state.selectedCollection 
        ? INITIAL_ITEMS.filter(item => item.collectionId === state.selectedCollection.id)
        : [...INITIAL_ITEMS];
      
      if (state.searchQuery) {
        const query = state.searchQuery.toLowerCase();
        filtered = filtered.filter(item => 
          item.name.toLowerCase().includes(query) ||
          item.tags.some(tag => tag.toLowerCase().includes(query))
        );
      }

      const collectionName = state.selectedCollection ? state.selectedCollection.name : '所有收藏品';
      
      let headerHtml = `
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
          <div class="flex items-center gap-4">
            <button onclick="selectCollection(null)" class="p-2 hover:bg-slate-200 rounded-xl transition-colors">
              <i data-lucide="chevron-right" class="rotate-180 w-6 h-6"></i>
            </button>
            <div>
              <h1 class="text-2xl font-bold">${collectionName}</h1>
              <nav class="flex text-xs text-slate-400 mt-1">
                <span>首頁</span>
                <span class="mx-2">/</span>
                <span class="text-blue-600">收藏品清單</span>
              </nav>
            </div>
          </div>

          <div class="flex items-center gap-2 bg-white p-1 rounded-2xl shadow-sm border border-slate-100 shrink-0">
            <button onclick="setViewMode('grid')" class="p-2 rounded-xl transition-all ${state.viewMode === 'grid' ? 'bg-blue-50 text-blue-600' : 'text-slate-400 hover:text-slate-600'}">
              <i data-lucide="layout-grid" class="w-5 h-5"></i>
            </button>
            <button onclick="setViewMode('list')" class="p-2 rounded-xl transition-all ${state.viewMode === 'list' ? 'bg-blue-50 text-blue-600' : 'text-slate-400 hover:text-slate-600'}">
              <i data-lucide="list" class="w-5 h-5"></i>
            </button>
            <div class="w-px h-6 bg-slate-200 mx-1"></div>
            <button class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 rounded-xl transition-colors">
              <i data-lucide="filter" class="w-[18px] h-[18px]"></i>
              <span>篩選</span>
            </button>
          </div>
        </div>
      `;

      let contentHtml = '';

      if (state.viewMode === 'grid') {
        const gridItems = filtered.map(item => {
          const stars = Array(5).fill(0).map((_, i) => 
            `<div class="w-3 h-3 rounded-full ${i < item.rating ? 'bg-amber-400' : 'bg-slate-200'} mr-0.5"></div>`
          ).join('');

          const tagsHtml = item.tags.map(tag => 
            `<span class="bg-black/50 backdrop-blur text-white text-[10px] px-2 py-0.5 rounded-full">#${tag}</span>`
          ).join('');

          return `
            <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden hover:shadow-lg transition-all group">
              <div class="relative h-48 overflow-hidden bg-slate-100">
                <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
                <div class="absolute top-3 right-3">
                  <button class="bg-white/90 backdrop-blur p-2 rounded-xl shadow-sm hover:text-rose-500 transition-colors">
                    <i data-lucide="heart" class="w-[18px] h-[18px]"></i>
                  </button>
                </div>
                <div class="absolute bottom-3 left-3 flex gap-1">${tagsHtml}</div>
              </div>
              <div class="p-5">
                <div class="flex justify-between items-start mb-2">
                  <h4 class="font-bold text-slate-900 leading-tight">${item.name}</h4>
                  <button class="text-slate-400 hover:text-slate-900"><i data-lucide="more-vertical" class="w-[18px] h-[18px]"></i></button>
                </div>
                <div class="flex items-center gap-2 mb-4">
                  <div class="flex">${stars}</div>
                  <span class="text-xs text-slate-400">(${item.status})</span>
                </div>
                <div class="flex justify-between items-center pt-4 border-t border-slate-50">
                  <div class="flex items-center gap-2 text-slate-500">
                    <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
                    <span class="text-xs">${item.date}</span>
                  </div>
                  <span class="font-bold text-blue-600">${item.price}</span>
                </div>
              </div>
            </div>
          `;
        }).join('');

        const addItemBtn = `
          <button onclick="toggleModal(true)" class="border-2 border-dashed border-slate-200 rounded-3xl flex flex-col items-center justify-center p-8 text-slate-400 hover:border-blue-400 hover:text-blue-400 hover:bg-blue-50 transition-all group min-h-[300px]">
            <div class="w-12 h-12 rounded-full border-2 border-dashed border-slate-300 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
              <i data-lucide="plus" class="w-6 h-6"></i>
            </div>
            <span class="font-semibold">新增收藏品</span>
          </button>
        `;

        contentHtml = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">${gridItems}${addItemBtn}</div>`;

      } else {
        // 列表檢視
        const rows = filtered.map(item => `
          <tr class="hover:bg-slate-50 transition-colors">
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <img src="${item.image}" class="w-10 h-10 rounded-lg object-cover" alt="${item.name}" />
                <span class="font-semibold text-sm">${item.name}</span>
              </div>
            </td>
            <td class="px-6 py-4 text-sm text-slate-500">${item.date}</td>
            <td class="px-6 py-4">
              <span class="px-2 py-1 rounded-lg text-xs font-medium ${item.status === '全新' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-700'}">
                ${item.status}
              </span>
            </td>
            <td class="px-6 py-4 font-bold text-sm">${item.price}</td>
            <td class="px-6 py-4">
              <button class="text-slate-400 hover:text-blue-600 transition-colors">編輯</button>
            </td>
          </tr>
        `).join('');

        contentHtml = `
          <div class="bg-white rounded-3xl border border-slate-100 overflow-hidden shadow-sm overflow-x-auto">
            <table class="w-full text-left min-w-[600px]">
              <thead class="bg-slate-50 border-b border-slate-100">
                <tr>
                  <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">項目名稱</th>
                  <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">取得日期</th>
                  <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">狀態</th>
                  <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">評估價值</th>
                  <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">操作</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-50">
                ${rows}
              </tbody>
            </table>
          </div>
        `;
      }

      return `<div class="space-y-6 animate-[fadeIn_0.5s_ease-out]">${headerHtml}${contentHtml}</div>`;
    }

    // --- 互動功能 ---
    window.navigate = function(tabId) {
      state.activeTab = tabId;
      if (tabId === 'dashboard') {
        state.selectedCollection = null;
      }
      render();
    };

    window.selectCollection = function(collectionId) {
      if (collectionId === null) {
        state.selectedCollection = null;
      } else {
        state.selectedCollection = INITIAL_COLLECTIONS.find(c => c.id === collectionId);
        state.activeTab = 'collections'; // 自動切換導航狀態
      }
      render();
    };

    window.setViewMode = function(mode) {
      state.viewMode = mode;
      render();
    };

    window.toggleModal = function(show) {
      if (show) {
        addModal.classList.remove('hidden');
        // 小小延遲以確保過渡動畫生效
        setTimeout(() => {
          modalContent.classList.remove('scale-95', 'opacity-0');
          modalContent.classList.add('scale-100', 'opacity-100');
        }, 10);
      } else {
        modalContent.classList.remove('scale-100', 'opacity-100');
        modalContent.classList.add('scale-95', 'opacity-0');
        setTimeout(() => {
          addModal.classList.add('hidden');
        }, 200);
      }
    };

    // 搜尋輸入監聽
    searchInput.addEventListener('input', (e) => {
      state.searchQuery = e.target.value;
      render();
    });

    // --- 初始化 ---
    render();

    // 簡單的 CSS 動畫定義 (用於動態渲染的內容)
    const style = document.createElement('style');
    style.innerHTML = `
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
};

export default App;
